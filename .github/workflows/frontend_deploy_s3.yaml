name: Frontend build and Deploy to S3

on:
#   push:
#     branches:
#       - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 22

    - name: Install dependencies
      working-directory: ./demo-frontend
      run: |
        npm i

    - name: Build frontend
      working-directory: ./demo-frontend
      run: |
        npm run build

    - name: Deploy to S3
      uses: jakejarvis/s3-sync-action@master
      with:
        args: --acl public-read --follow-symlinks --delete
      env:
        AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }} # Название бакета, нужно добавить в репозитории
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} # Ключ доступа, нужно добавить в репозитории (создайте сервисный аккаунт с правами на S3 и получите его статические ключи доступа)
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # Секретный ключ, нужно добавить в репозитории
        AWS_S3_ENDPOINT: 'https://storage.yandexcloud.net'
        AWS_REGION: 'ru-central1'
        SOURCE_DIR: './demo-frontend/dist' # Путь к скомпилированному фронтенду
        DEST_DIR: '' # Папка в бакете для размещения фронта